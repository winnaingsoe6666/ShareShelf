server:
  port: ${PORT:8080}
  

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    clean-disabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "https://shareshelf-production.up.railway.app/login/oauth2/code/google"
            scope:
              - openid
              - profile
              - email
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.shareshelf: WARN
    org.springframework: WARN
    org.springframework.security: ERROR
    org.hibernate: ERROR
    org.hibernate.SQL: ERROR
    org.apache.tomcat: ERROR
    org.apache.catalina: ERROR

app:
  upload-dir: uploads
  frontend-url: ${FRONTEND_URL:https://shareshelf.vercel.app}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://shareshelf.vercel.app,http://localhost:3000}
  r2:
    endpoint: ${R2_ENDPOINT:https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com}
    access-key-id: ${R2_ACCESS_KEY_ID:disabled}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:disabled}
    bucket: ${R2_BUCKET:shareshelf-images}
    public-url: ${R2_PUBLIC_URL:https://YOUR_R2_PUBLIC_DOMAIN}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
