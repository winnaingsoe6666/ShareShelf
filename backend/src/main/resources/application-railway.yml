# Railway deployment profile
# Railway injects PORT and DATABASE_URL when PostgreSQL plugin is attached.
# DATABASE_URL format: postgresql://user:password@host:port/db?sslmode=require
server:
  port: ${PORT:8080}

spring:
  datasource:
    # DATABASE_URL already includes user:password@host:port/db, so prepending jdbc:
    # gives us jdbc:postgresql://user:password@host:port/db?sslmode=require
    url: jdbc:${DATABASE_URL}
    # Username and password are embedded in DATABASE_URL; do not set them separately.
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      # Give the DB more time to accept connections on cold start
      connection-timeout: 30000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    clean-disabled: true

logging:
  level:
    com.shareshelf: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
