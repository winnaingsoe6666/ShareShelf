# Railway deployment profile
# Railway injects PORT and DATABASE_URL when PostgreSQL plugin is attached.
# DATABASE_URL format: postgres://user:password@host:port/db?sslmode=require
# We use individual PG variables (PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE)
# instead of DATABASE_URL because its postgres:// scheme is not valid JDBC syntax.
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      # Give the DB more time to accept connections on cold start
      connection-timeout: 30000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    clean-disabled: true

logging:
  level:
    com.shareshelf: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
