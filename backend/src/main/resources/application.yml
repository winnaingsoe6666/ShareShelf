server:
  port: 8080
  
spring:
  application:
    name: shareshelf
  datasource:
    url: jdbc:postgresql://localhost:5432/shareshelf
    username: shareshelf
    password: ${DB_PASSWORD:shareshelf_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false


  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "https://shareshelf-production.up.railway.app/login/oauth2/code/google"
            scope:
              - openid
              - profile
              - email

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:shareshelf-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: 86400000 # 24 hours
  refresh-expiration-ms: 604800000 # 7 days

# File upload
app:
  upload-dir: uploads
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  r2:
    endpoint: ${R2_ENDPOINT:https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com}
    access-key-id: ${R2_ACCESS_KEY_ID:minioadmin}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:minioadmin}
    bucket: ${R2_BUCKET:shareshelf-images}
    public-url: ${R2_PUBLIC_URL:https://YOUR_R2_PUBLIC_DOMAIN}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
