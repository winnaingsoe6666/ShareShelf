spring:
  jpa:
    show-sql: true

logging:
  level:
    com.shareshelf: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Cloudflare R2 for local development
# Set R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_URL
# environment variables with your Cloudflare R2 credentials.
# Get them from: Cloudflare Dashboard → R2 → Manage R2 API Tokens
app:
  r2:
    endpoint: ${R2_ENDPOINT:https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com}
    access-key-id: ${R2_ACCESS_KEY_ID:your-dev-key}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:your-dev-secret}
    bucket: ${R2_BUCKET:shareshelf-dev}
    public-url: ${R2_PUBLIC_URL:https://your-dev-bucket.YOUR_ACCOUNT_ID.r2.cloudflarestorage.com}
