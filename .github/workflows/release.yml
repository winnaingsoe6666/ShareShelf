name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be semver (e.g. 1.0.0)"
            exit 1
          fi

      - name: Update mobile version
        working-directory: mobile
        run: |
          jq --arg v "${{ inputs.version }}" '.expo.version = $v' app.json > tmp.json \
            && mv tmp.json app.json

      - name: Update backend version
        run: |
          sed -i "s/version = \".*\"/version = \"${{ inputs.version }}\"/" backend/build.gradle.kts

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/app.json backend/build.gradle.kts
          git commit -m "release: v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
