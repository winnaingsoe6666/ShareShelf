name: Mobile Preview Build

on:
  pull_request:
    branches: [main]
    paths: ["mobile/**", "packages/shared/**"]

jobs:
  eas-build:
    name: EAS Preview Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22.12
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install shared package dependencies
        working-directory: packages/shared
        run: npm install

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Debug expo config
        working-directory: mobile
        run: node node_modules/expo/bin/cli config 2>&1; echo "EXIT: $?"

      - name: Build preview
        working-directory: mobile
        run: eas build --profile preview --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
